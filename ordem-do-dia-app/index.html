<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f0f2f5;color:#1a1a2e;overflow-x:hidden}
@keyframes pulse-live{0%,100%{box-shadow:0 0 0 0 rgba(233,69,96,.4)}50%{box-shadow:0 0 0 12px rgba(233,69,96,0)}}
@keyframes pulse-late{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.4)}50%{box-shadow:0 0 0 10px rgba(255,107,53,0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes countPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.animate-fade{animation:fadeIn .4s ease}
.animate-slide-up{animation:slideUp .3s ease}
.pulse-live{animation:pulse-live 2s infinite}
.pulse-late{animation:pulse-late 2s infinite}
.count-pulse{animation:countPulse 1s ease infinite}
.tap-scale{transition:transform .1s}
.tap-scale:active{transform:scale(.96)}
.hide-scroll::-webkit-scrollbar{display:none}
.hide-scroll{-ms-overflow-style:none;scrollbar-width:none}
.glass{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.timeline-line{position:absolute;left:28px;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,#e94560,#0f3460)}
@media print{.no-print{display:none!important}}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo}=React;

const ROLES={ADMIN:'admin',EQUIPE:'equipe',CLIENTE:'cliente'};
const CARGOS=['Direção','AD','Produção','Dir. Foto','Op. Câmera','Op. Áudio','Make','Fotógrafo Still','Elenco','Outro'];

const API_CONFIG={
  SCRIPT_URL:'https://script.google.com/macros/s/AKfycbzy48QrzbIge9fVa54pjmohpKWgS1UkEqB8VxULIR3k_MKrjLPyveLlGeIBeHS9mpc7Hg/exec',
  CLIENT_ID:'719102227600-frl30dkas9fpar88fcvknq3alqek4h3i.apps.googleusercontent.com',
  WEATHER_API_KEY:'fcdcb6ab602a1b03aaf9e9fe37a3e43e',
  POLLING_INTERVAL:10000,
  ADMIN_EMAILS:['douglas@conteudourbano.com.br','vini@conteudourbano.com.br','fausto@conteudourbano.com.br'],
};

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const genId=()=>Math.random().toString(36).slice(2,10);
const initials=(name)=>{const p=name.split(' ');return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():name.slice(0,2).toUpperCase();};
const timeToMin=(t)=>{if(!t)return 0;const[h,m]=(t+'').split(':').map(Number);return(h||0)*60+(m||0);};
const minToTime=(m)=>{const h=Math.floor(m/60);const mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');};
const calcTermino=(inicio,duracao)=>minToTime(timeToMin(inicio)+timeToMin(duracao));
const recalcTimes=(blocks,fromIndex)=>{const r=[...blocks];for(let i=fromIndex;i<r.length;i++){const it={...r[i]};if(i>0&&i===fromIndex){it.termino=calcTermino(it.inicio,it.duracao);}else if(i>0){const prev=r[i-1];it.inicio=prev.termino;it.termino=calcTermino(it.inicio,it.duracao);}else{it.termino=calcTermino(it.inicio,it.duracao);}r[i]=it;}return r;};
const autoDetectLate=(cronograma)=>{const now=new Date();const currentDate=now.toISOString().split('T')[0];const curMin=now.getHours()*60+now.getMinutes();const updated={};for(const[data,blocks]of Object.entries(cronograma)){updated[data]=blocks.map(it=>{if(it.status==='pendente'&&data===currentDate&&timeToMin(it.inicio)<curMin){return{...it,status:'atrasado'};}return it;});}return updated;};
const weatherIcon=(code)=>{const map={'01':'☀️','02':'⛅','03':'☁️','04':'☁️','09':'🌧️','10':'🌦️','11':'⛈️','13':'❄️','50':'🌫️'};return map[(code||'01').slice(0,2)]||'☀️';};
const isLate=(hora,esperado)=>{if(!hora||!esperado)return false;return timeToMin(hora)>timeToMin(esperado);};
const statusIcon=(s)=>{const m={pendente:'⏳',em_andamento:'▶️',concluido:'✅',atrasado:'🔴'};return m[s]||'⏳';};
const tipoColor=(tipo)=>{if(!tipo)return'bg-gray-100 text-gray-600';const t=tipo.toUpperCase();if(t.includes('GRAVAÇÃO'))return'bg-accent/20 text-accent';if(t.includes('DESLOC'))return'bg-blue-100 text-blue-700';return'bg-gray-100 text-gray-600';};
const exportPDF=(elementId,filename)=>{const el=document.getElementById(elementId);if(!el){alert('Área não encontrada para exportar');return;}html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff'}).then(canvas=>{const{jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');const w=pdf.internal.pageSize.getWidth();const h=(canvas.height*w)/canvas.width;pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,w,h);pdf.save(filename||'ordem-do-dia.pdf');}).catch(err=>alert('Erro ao gerar PDF: '+err.message));};

// ═══════════════════════════════════════════
// ERROR BOUNDARY
// ═══════════════════════════════════════════
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,errorInfo){console.error('Error:',error,errorInfo);}
  render(){if(this.state.hasError){return(<div className="min-h-screen bg-red-50 flex items-center justify-center p-6"><div className="bg-white rounded-2xl p-8 max-w-sm text-center"><h1 className="text-xl font-bold text-red-600 mb-2">Erro</h1><p className="text-sm text-gray-600 mb-4">{this.state.error?.message}</p><button onClick={()=>window.location.reload()} className="bg-red-600 text-white px-4 py-2 rounded-lg font-semibold">Recarregar</button></div></div>);}return this.props.children;}
}

// ═══════════════════════════════════════════
// COMPONENTS
// ═══════════════════════════════════════════

function Avatar({name,size='w-9 h-9',textSize='text-xs'}){
  const colors=['bg-accent','bg-deep','bg-navy','bg-emerald-600','bg-violet-600','bg-amber-600','bg-rose-600','bg-teal-600'];
  const ci=name.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%colors.length;
  return(<div className={`${size} ${colors[ci]} rounded-full flex items-center justify-center text-white font-semibold ${textSize} shrink-0`}>{initials(name)}</div>);
}

function LoginScreen({onLogin}){
  const[err,setErr]=useState('');
  const[email,setEmail]=useState('');
  const[mode,setMode]=useState('select');
  const[loading,setLoading]=useState(false);
  const googleBtnRef=useRef(null);

  // Decodificar JWT do Google
  const decodeJwt=(token)=>{try{const b=token.split('.')[1];const txt=atob(b.replace(/-/g,'+').replace(/_/g,'/'));return JSON.parse(txt);}catch(e){return null;}};

  // Determinar role baseado no email
  const getRole=(email)=>{
    if(API_CONFIG.ADMIN_EMAILS.includes(email))return ROLES.ADMIN;
    if(email.endsWith('@conteudourbano.com.br'))return ROLES.EQUIPE;
    return ROLES.CLIENTE;
  };

  // Callback do Google Sign-In
  const handleGoogleResponse=(response)=>{
    setLoading(true);
    const payload=decodeJwt(response.credential);
    if(!payload||!payload.email){setErr('Erro ao autenticar com Google');setLoading(false);return;}
    const role=getRole(payload.email);
    onLogin({name:payload.name||payload.email.split('@')[0],email:payload.email,picture:payload.picture||null,demo:false,role});
  };

  // Inicializar Google Sign-In
  useEffect(()=>{
    if(mode!=='select'||!googleBtnRef.current)return;
    const initGoogle=()=>{
      if(!window.google?.accounts?.id)return;
      window.google.accounts.id.initialize({
        client_id:API_CONFIG.CLIENT_ID,
        callback:handleGoogleResponse,
        auto_select:false,
      });
      window.google.accounts.id.renderButton(googleBtnRef.current,{
        type:'standard',
        theme:'outline',
        size:'large',
        text:'signin_with',
        shape:'pill',
        width:300,
        locale:'pt-BR',
      });
    };
    if(window.google?.accounts?.id){initGoogle();}
    else{const t=setInterval(()=>{if(window.google?.accounts?.id){initGoogle();clearInterval(t);}},200);return()=>clearInterval(t);}
  },[mode]);

  // Acesso cliente por email
  const handleClientAccess=()=>{
    if(!email.trim()){setErr('Digite seu email');return;}
    const e=email.trim().toLowerCase();
    if(e.endsWith('@conteudourbano.com.br')){setErr('Emails @conteudourbano.com.br devem usar o login Google');return;}
    onLogin({name:e.split('@')[0],email:e,picture:null,demo:false,role:ROLES.CLIENTE});
  };

  return(
    <div className="min-h-screen bg-gradient-to-br from-dark via-navy to-deep flex items-center justify-center p-6">
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm animate-fade text-center">
        <div className="flex justify-center mb-4">
          <div className="text-2xl font-black text-dark tracking-tight">CONTEÚDO URBANO</div>
        </div>
        <h1 className="text-xl font-bold text-dark mb-1">Ordem do Dia</h1>
        <p className="text-gray-400 text-sm mb-6">Sistema de Gestão de Set</p>
        {err&&<div className="bg-red-50 text-red-600 text-sm rounded-lg p-3 mb-4">{err}</div>}
        {loading&&<div className="text-sm text-gray-500 mb-4">Autenticando...</div>}
        {mode==='select'&&(
          <div className="space-y-4">
            <div>
              <p className="text-xs font-semibold text-gray-500 uppercase mb-3">Equipe Conteúdo Urbano</p>
              <div className="flex justify-center" ref={googleBtnRef}></div>
            </div>
            <div className="flex items-center gap-3 my-2"><div className="flex-1 h-px bg-gray-200"/><span className="text-xs text-gray-400">ou</span><div className="flex-1 h-px bg-gray-200"/></div>
            <div>
              <p className="text-xs font-semibold text-gray-500 uppercase mb-3">Acesso Cliente</p>
              <button onClick={()=>setMode('client')} className="w-full bg-white border-2 border-gray-200 hover:border-accent rounded-xl py-3 px-4 font-medium text-gray-700 tap-scale transition-all">
                Entrar com email
              </button>
            </div>
          </div>
        )}
        {mode==='client'&&(
          <div className="space-y-3">
            <input type="email" placeholder="Seu email de cliente" value={email} onChange={e=>setEmail(e.target.value)}
              className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-accent focus:outline-none"
              onKeyDown={e=>{if(e.key==='Enter')handleClientAccess();}}/>
            <button onClick={handleClientAccess} className="w-full bg-accent hover:bg-accentHover text-white rounded-xl py-3 px-4 font-semibold tap-scale transition-all">Acessar</button>
            <button onClick={()=>{setMode('select');setErr('');}} className="text-sm text-gray-400 hover:text-gray-600">← Voltar</button>
          </div>
        )}
        <p className="text-xs text-gray-400 mt-6">Equipe: login Google · Clientes: email</p>
      </div>
    </div>
  );
}

function WelcomePopup({data,onClose,onExport,onSendEmail}){
  if(!data)return null;
  return(
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-auto animate-fade" onClick={e=>e.stopPropagation()} id="od-summary">
        <div className="bg-gradient-to-r from-dark via-navy to-deep text-white p-6 rounded-t-2xl">
          <div className="flex items-center justify-between mb-3">
            <span className="text-sm font-black text-white tracking-tight">CONTEÚDO URBANO</span>
          </div>
          <h2 className="text-lg font-bold">ORDEM DO DIA</h2>
          <p className="text-white/80 text-sm">{data.projeto.nome}</p>
          <p className="text-white/60 text-xs mt-1">Cliente: {data.projeto.cliente}</p>
        </div>
        <div className="p-6">
          <h3 className="font-bold text-sm text-gray-500 uppercase mb-3">📍 Locações</h3>
          <div className="space-y-2 mb-5">
            {data.locacoes.map(l=>(
              <div key={l.id} className={`block p-3 rounded-xl transition-all ${l.tipo==='hospital'?'bg-red-50 border border-red-200':'bg-blue-50 border border-blue-200'}`}>
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-lg">{l.tipo==='hospital'?'🏥':'📍'}</span>
                  <span className="text-sm font-bold">{l.nome}</span>
                  <span className="text-xs text-gray-400 ml-auto">{l.observacao}</span>
                </div>
                <p className="text-xs text-gray-600 pl-7">{l.endereco}</p>
              </div>
            ))}
          </div>
          <h3 className="font-bold text-sm text-gray-500 uppercase mb-3">👥 Equipe ({data.equipe.length})</h3>
          <div className="grid grid-cols-2 gap-2 mb-5">
            {data.equipe.map(m=>(
              <div key={m.id} className="flex items-center gap-2 p-2 bg-gray-50 rounded-lg">
                <Avatar name={m.nome} size="w-7 h-7" textSize="text-[10px]"/>
                <div className="min-w-0"><div className="text-xs font-medium truncate">{m.nome}</div><div className="text-[10px] text-gray-400">{m.cargo||m.funcao}</div></div>
              </div>
            ))}
          </div>
          <div className="flex gap-2 pt-3">
            <button onClick={onClose} className="flex-1 bg-accent hover:bg-accentHover text-white rounded-xl py-3 px-4 font-semibold tap-scale transition-all text-sm">
              Entrar no App
            </button>
            <button onClick={onExport} className="bg-dark hover:bg-navy text-white rounded-xl py-2 px-3 font-semibold tap-scale transition-all text-sm shrink-0">
              📄
            </button>
            <button onClick={onSendEmail} className="bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl py-2 px-3 font-semibold tap-scale transition-all text-sm shrink-0">
              📧
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function DayTab({dia,active,onClick}){
  return(
    <button onClick={onClick}
      className={`shrink-0 rounded-xl px-4 py-2.5 tap-scale transition-all ${active?'bg-dark text-white shadow-lg scale-105':'bg-white text-gray-600 hover:bg-gray-50 shadow'}`}>
      <div className="text-sm font-bold">{dia.label}</div>
      <div className="text-xs opacity-70">{dia.semana}</div>
      <div className={`text-xs mt-1 px-2 py-0.5 rounded-full font-medium inline-block ${(dia.tipo||'').includes('GRAVAÇÃO')?'bg-accent/20 text-accent':'bg-blue-100 text-blue-700'}`}>{dia.tipo}</div>
    </button>
  );
}

function TimelineBlock({item,isAdmin,onEdit}){
  const isAtrasado=item.status==='atrasado';
  const isLive=false;
  return(
    <div className={`relative pl-14 pr-4 py-3 mb-3 animate-fade ${isAdmin?'tap-scale cursor-pointer':''}`} onClick={()=>isAdmin&&onEdit(item)}>
      <div className={`absolute left-5 top-5 w-7 h-7 rounded-full flex items-center justify-center text-sm z-10 shadow ${item.status==='concluido'?'bg-emerald-500 text-white':isLive?'bg-accent text-white count-pulse':isAtrasado?'bg-late text-white count-pulse':'bg-gray-200 text-gray-500'}`}>
        {item.status==='concluido'?'✓':isLive?'▶':isAtrasado?'!':'○'}
      </div>
      <div className={`rounded-xl p-4 transition-all shadow-sm ${isLive?'bg-white border-2 border-accent pulse-live shadow-lg':isAtrasado?'bg-lateLight border-2 border-late pulse-late shadow-lg':'bg-white border border-gray-100 hover:shadow-md'}`}>
        {isLive&&<span className="inline-block bg-accent text-white text-xs font-bold px-2 py-0.5 rounded-full mb-2 animate-pulse">AO VIVO</span>}
        {isAtrasado&&<span className="inline-block bg-late text-white text-xs font-bold px-2 py-0.5 rounded-full mb-2">ATRASADO</span>}
        <div className="flex items-start justify-between gap-3">
          <div className="flex-1">
            <div className="flex items-center gap-2 mb-1">
              <span className="text-lg font-bold text-dark">{item.inicio}</span>
              {item.termino&&<span className="text-gray-400 text-sm">→ {item.termino}</span>}
            </div>
            <h3 className="font-semibold text-dark text-sm leading-snug">{item.nome}</h3>
            {item.obs&&<p className="text-xs text-gray-500 mt-1">{item.obs}</p>}
          </div>
          <div className="text-right shrink-0">
            <span className="text-xs font-medium text-gray-400">{item.duracao}</span>
            <div className="mt-2"><span className="text-xs">{statusIcon(item.status)}</span></div>
          </div>
        </div>
        <div className="mt-3 h-1.5 bg-gray-100 rounded-full overflow-hidden">
          <div className={`h-full rounded-full transition-all ${item.status==='concluido'?'bg-emerald-400':isLive?'bg-accent':isAtrasado?'bg-late':'bg-gray-200'}`} style={{width:'50%'}}></div>
        </div>
      </div>
    </div>
  );
}

function EditModal({item,onSave,onClose}){
  const[inicio,setInicio]=useState(item.inicio);
  const[duracao,setDuracao]=useState(item.duracao);
  const[nome,setNome]=useState(item.nome);
  const[obs,setObs]=useState(item.obs||'');
  const[status,setStatus]=useState(item.status);

  const handleSave=()=>{
    onSave({...item,inicio,duracao,termino:calcTermino(inicio,duracao),nome,obs,status});
  };

  return(
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-sm p-6 animate-slide-up" onClick={e=>e.stopPropagation()}>
        <h2 className="text-lg font-bold mb-4">Editar Atividade</h2>
        <div className="space-y-3">
          <div>
            <label className="text-xs font-semibold text-gray-500 block mb-1">Nome</label>
            <input className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-accent focus:outline-none" value={nome} onChange={e=>setNome(e.target.value)}/>
          </div>
          <div className="grid grid-cols-2 gap-2">
            <div>
              <label className="text-xs font-semibold text-gray-500 block mb-1">Início</label>
              <input type="time" className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-accent focus:outline-none" value={inicio} onChange={e=>setInicio(e.target.value)}/>
            </div>
            <div>
              <label className="text-xs font-semibold text-gray-500 block mb-1">Duração</label>
              <input placeholder="HH:MM" className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-accent focus:outline-none" value={duracao} onChange={e=>setDuracao(e.target.value)}/>
            </div>
          </div>
          <div>
            <label className="text-xs font-semibold text-gray-500 block mb-1">Status</label>
            <select className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-accent focus:outline-none" value={status} onChange={e=>setStatus(e.target.value)}>
              <option value="pendente">Pendente</option>
              <option value="em_andamento">Em Andamento</option>
              <option value="concluido">Concluído</option>
              <option value="atrasado">Atrasado</option>
            </select>
          </div>
          <div>
            <label className="text-xs font-semibold text-gray-500 block mb-1">Observação</label>
            <textarea className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-accent focus:outline-none" rows="2" value={obs} onChange={e=>setObs(e.target.value)}/>
          </div>
          <div className="flex gap-2 pt-2">
            <button onClick={onClose} className="flex-1 bg-gray-100 hover:bg-gray-200 text-dark font-medium py-2 rounded-xl tap-scale transition-all text-sm">
              Cancelar
            </button>
            <button onClick={handleSave} className="flex-1 bg-accent hover:bg-accentHover text-white font-semibold py-2 rounded-xl tap-scale transition-all text-sm">
              Salvar
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function TeamManager({equipe,onUpdate,onClose}){
  const[members,setMembers]=useState(equipe);
  const[nome,setNome]=useState('');
  const[cargo,setCargo]=useState('Direção');
  const[email,setEmail]=useState('');
  const[telefone,setTelefone]=useState('');
  const[horario_chegada,setHorario_chegada]=useState('');

  const addMember=()=>{
    if(!nome.trim()||!cargo.trim()||!email.trim()){alert('Preencha nome, cargo e email');return;}
    setMembers(p=>[...p,{id:genId(),nome:nome.trim(),cargo,email:email.trim(),telefone,horario_chegada}]);
    setNome('');setCargo('Direção');setEmail('');setTelefone('');setHorario_chegada('');
  };

  const removeMember=(id)=>setMembers(p=>p.filter(m=>m.id!==id));

  const handleSave=()=>{onUpdate(members);onClose();};

  return(
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-md max-h-[90vh] overflow-auto p-6 animate-slide-up" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-lg font-bold">👥 Gerenciar Equipe</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        <div className="space-y-3 mb-4">
          <input placeholder="Nome" className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-accent focus:outline-none" value={nome} onChange={e=>setNome(e.target.value)}/>
          <select className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-accent focus:outline-none" value={cargo} onChange={e=>setCargo(e.target.value)}>
            {CARGOS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <input placeholder="Email" type="email" className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-accent focus:outline-none" value={email} onChange={e=>setEmail(e.target.value)}/>
          <input placeholder="Telefone" className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-accent focus:outline-none" value={telefone} onChange={e=>setTelefone(e.target.value)}/>
          <input placeholder="Horário Chegada" type="time" className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-accent focus:outline-none" value={horario_chegada} onChange={e=>setHorario_chegada(e.target.value)}/>
          <button onClick={addMember} className="w-full bg-dark hover:bg-navy text-white font-semibold py-2 rounded-xl tap-scale transition-all text-sm">
            + Adicionar
          </button>
        </div>
        <div className="space-y-2 max-h-[40vh] overflow-auto mb-4">
          {members.map(m=>(
            <div key={m.id} className="flex items-center gap-2 p-3 bg-gray-50 rounded-lg">
              <Avatar name={m.nome} size="w-8 h-8" textSize="text-[10px]"/>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium">{m.nome}</div>
                <div className="text-xs text-gray-500">{m.cargo} • {m.email}</div>
              </div>
              <button onClick={()=>removeMember(m.id)} className="text-red-400 hover:text-red-600 text-lg leading-none font-bold">×</button>
            </div>
          ))}
        </div>
        <div className="flex gap-2">
          <button onClick={onClose} className="flex-1 bg-gray-100 hover:bg-gray-200 text-dark font-medium py-2 rounded-xl text-sm">Cancelar</button>
          <button onClick={handleSave} className="flex-1 bg-accent hover:bg-accentHover text-white font-semibold py-2 rounded-xl text-sm">Salvar</button>
        </div>
      </div>
    </div>
  );
}

function HistoryModal({historico,onClose,onSelect}){
  return(
    <div className="fixed inset-0 bg-black/50 flex items-end sm:items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-md max-h-[80vh] overflow-auto p-6 animate-slide-up" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">

function NewODModal({onClose,onCreate}){
  const SEMANA=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const TIPOS=['DESLOCAMENTO','GRAVAÇÃO','PÓS-PRODUÇÃO','REUNIÃO','PREPARAÇÃO','OUTRO'];
  const[step,setStep]=useState(1);
  const[nome,setNome]=useState('');
  const[cliente,setCliente]=useState('');
  const[cidade,setCidade]=useState('');
  const[inicio,setInicio]=useState('');
  const[fim,setFim]=useState('');
  const[locNome,setLocNome]=useState('');
  const[locEnd,setLocEnd]=useState('');
  const[locacoes,setLocacoes]=useState([]);
  const[dias,setDias]=useState([]);
  const[err,setErr]=useState('');

  const generateDias=()=>{
    if(!inicio||!fim)return[];
    const d1=new Date(inicio+'T12:00:00');const d2=new Date(fim+'T12:00:00');
    const result=[];
    for(let d=new Date(d1);d<=d2;d.setDate(d.getDate()+1)){
      const dateStr=d.toISOString().split('T')[0];
      const dd=String(d.getDate()).padStart(2,'0');
      const label=`${dd}/${MESES[d.getMonth()]}`;
      const semana=SEMANA[d.getDay()];
      result.push({data:dateStr,label,semana,tipo:'GRAVAÇÃO',locacao:''});
    }
    return result;
  };

  const goStep2=()=>{
    if(!nome||!cliente||!inicio||!fim){setErr('Preencha todos os campos');return;}
    if(new Date(fim)<new Date(inicio)){setErr('Data fim deve ser após data início');return;}
    const d=generateDias();
    if(d.length>14){setErr('Máximo 14 dias por OD');return;}
    setDias(d);setErr('');setStep(2);
  };

  const addLoc=()=>{
    if(!locNome.trim())return;
    setLocacoes(p=>[...p,{id:genId(),nome:locNome.trim(),endereco:locEnd.trim(),tipo:'locacao',observacao:`Locação ${p.length+1}`}]);
    setLocNome('');setLocEnd('');
  };

  const removeLoc=(id)=>setLocacoes(p=>p.filter(l=>l.id!==id));

  const updateDia=(idx,field,val)=>{
    setDias(p=>{const n=[...p];n[idx]={...n[idx],[field]:val};return n;});
  };

  const handleCreate=()=>{
    const crono={};
    dias.forEach(d=>{crono[d.data]=[{id:genId(),inicio:'09:00',nome:'PRIMEIRA ATIVIDADE',duracao:'01:00',obs:'',termino:'10:00',status:'pendente',imagens:[]}];});
    onCreate({
      id:genId(),
      projeto:{nome,cliente,campanha:`${nome} - ${cidade}`,locacoes_texto:locacoes.map(l=>l.nome).join(' / '),logo_cliente:null},
      equipe:[],
      locacoes,
      dias,
      clima:dias.map(d=>({data:d.data,min:0,max:0,chuva:0,desc:'--',icon:'01d',cidade:cidade||''})),
      cronograma:crono,
      checkins:[],
      criada:new Date().toISOString(),
    });
  };

  const inp='w-full border-2 border-gray-200 focus:border-accent rounded-xl px-3 py-2.5 text-sm focus:outline-none transition-colors';

  return(
    <div className="fixed inset-0 bg-black/50 flex items-end sm:items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-md max-h-[90vh] overflow-auto p-6 animate-slide-up" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-lg font-bold">{step===1?'➕ Nova Ordem do Dia':'📋 Configurar Dias'}</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        {err&&<div className="bg-red-50 text-red-600 text-sm rounded-lg p-3 mb-3">{err}</div>}

        {step===1&&(
          <div className="space-y-3">
            <div><label className="text-xs font-semibold text-gray-500 block mb-1">Nome do Projeto *</label>
              <input className={inp} value={nome} onChange={e=>setNome(e.target.value)} placeholder="Ex: CAMPANHA VERÃO 2026"/></div>
            <div><label className="text-xs font-semibold text-gray-500 block mb-1">Cliente *</label>
              <input className={inp} value={cliente} onChange={e=>setCliente(e.target.value)} placeholder="Ex: Janssen / Johnson & Johnson"/></div>
            <div><label className="text-xs font-semibold text-gray-500 block mb-1">Cidade</label>
              <input className={inp} value={cidade} onChange={e=>setCidade(e.target.value)} placeholder="Ex: São Paulo"/></div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="text-xs font-semibold text-gray-500 block mb-1">Data Início *</label>
                <input type="date" className={inp} value={inicio} onChange={e=>setInicio(e.target.value)}/></div>
              <div><label className="text-xs font-semibold text-gray-500 block mb-1">Data Fim *</label>
                <input type="date" className={inp} value={fim} onChange={e=>setFim(e.target.value)}/></div>
            </div>
            <div className="pt-2">
              <label className="text-xs font-semibold text-gray-500 block mb-2">Locações (opcional)</label>
              <div className="flex gap-2 mb-2">
                <input className={`${inp} flex-1`} value={locNome} onChange={e=>setLocNome(e.target.value)} placeholder="Nome da locação"/>
                <button onClick={addLoc} className="bg-dark text-white px-3 rounded-xl text-lg font-bold shrink-0">+</button>
              </div>
              {locNome&&<input className={`${inp} mb-2`} value={locEnd} onChange={e=>setLocEnd(e.target.value)} placeholder="Endereço (opcional)"/>}
              {locacoes.length>0&&(
                <div className="space-y-1">
                  {locacoes.map(l=>(
                    <div key={l.id} className="flex items-center gap-2 bg-blue-50 rounded-lg px-3 py-2 text-sm">
                      <span className="flex-1">📍 {l.nome}</span>
                      <button onClick={()=>removeLoc(l.id)} className="text-red-400 hover:text-red-600 font-bold">×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <button onClick={goStep2} className="w-full mt-2 bg-accent hover:bg-accentHover text-white font-semibold py-3 rounded-xl tap-scale transition-all">
              Próximo: Configurar Dias →
            </button>
          </div>
        )}

        {step===2&&(
          <div className="space-y-3">
            <p className="text-xs text-gray-400 mb-1">{dias.length} dia(s) · Defina o tipo de cada dia</p>
            <div className="max-h-[45vh] overflow-auto">
              {dias.map((d,i)=>(
                <div key={d.data} className="bg-gray-50 rounded-xl p-3 mb-2">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-sm font-bold">{d.label} — {d.semana}</span>
                  </div>
                  <select value={d.tipo} onChange={e=>updateDia(i,'tipo',e.target.value)}
                    className="w-full border rounded-lg px-3 py-2 text-sm bg-white mb-2">
                    {TIPOS.map(t=><option key={t} value={t}>{t}</option>)}
                  </select>
                  {locacoes.length>0&&(
                    <select value={d.locacao||''} onChange={e=>updateDia(i,'locacao',e.target.value)}
                      className="w-full border rounded-lg px-3 py-2 text-sm bg-white">
                      <option value="">Sem locação definida</option>
                      {locacoes.map(l=><option key={l.id} value={l.nome}>{l.nome}</option>)}
                    </select>
                  )}
                </div>
              ))}
            </div>
            <div className="flex gap-2 pt-2">
              <button onClick={()=>setStep(1)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-dark font-medium py-3 rounded-xl tap-scale transition-all">← Voltar</button>
              <button onClick={handleCreate} className="flex-1 bg-accent hover:bg-accentHover text-white font-semibold py-3 rounded-xl tap-scale transition-all">
                Criar OD ✓
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// MAIN APP

function App(){
  const[user,setUser]=useState(null);
  const[od,setOD]=useState(null);
  const[showWelcome,setShowWelcome]=useState(false);
  const[showNewOD,setShowNewOD]=useState(false);
  const[showTeamMgr,setShowTeamMgr]=useState(false);
  const[showHistory,setShowHistory]=useState(false);
  const[showEditModal,setShowEditModal]=useState(false);
  const[editingItem,setEditingItem]=useState(null);
  const[activeDay,setActiveDay]=useState(null);
  const[toast,setToast]=useState('');
  const[historico,setHistorico]=useState([]);

  useEffect(()=>{
    const urlParams=new URLSearchParams(window.location.search);
    const odId=urlParams.get('od');
    if(odId){console.log('Load OD:',odId);}
  },[]);

  const handleLogin=(u)=>{
    setUser(u);
    setShowWelcome(true);
  };

  const handleCreateOD=(newOD)=>{
    setOD(newOD);
    setShowNewOD(false);
    if(newOD.dias.length>0)setActiveDay(newOD.dias[0].data);
    window.history.pushState({},'',`?od=${newOD.id}`);
  };

  // Função auxiliar para chamar o backend
  const apiCall=(action,data={})=>{
    const url=`${API_CONFIG.SCRIPT_URL}?action=${encodeURIComponent(action)}`;
    return fetch(url,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action,email:user?.email||'',...data}),
    }).then(r=>r.json()).catch(err=>({success:false,error:err.message}));
  };

  // Carregar histórico do backend
  const loadHistorico=()=>{
    apiCall('listODs').then(res=>{
      if(res.success&&res.data){setHistorico(res.data);}
    }).catch(()=>{});
  };

  // Carregar histórico ao logar
  useEffect(()=>{if(user)loadHistorico();},[user]);

  const handleSaveOD=()=>{
    if(!od)return;
    setToast('Salvando...');
    const payload={
      id:od.id||null,
      nome_projeto:od.projeto?.nome||'',
      cliente:od.projeto?.cliente||'',
      cidade:od.projeto?.cidade||od.clima?.[0]?.cidade||'',
      campanha:od.projeto?.campanha||'',
      data_inicio:od.dias?.[0]?.data||'',
      data_fim:od.dias?.[od.dias.length-1]?.data||'',
      equipe:od.equipe||[],
      locacoes:od.locacoes||[],
      cronograma:od.cronograma||{},
      dias:od.dias||[],
    };
    apiCall('saveOD',payload).then(res=>{
      if(res.success){
        if(res.data?.id&&!od.id){setOD({...od,id:res.data.id});window.history.pushState({},'',`?od=${res.data.id}`);}
        setToast('OD salva com sucesso!');
        loadHistorico();
      }else{
        setToast('Erro ao salvar: '+(res.error||'desconhecido'));
      }
      setTimeout(()=>setToast(''),3000);
    });
  };

  const handleExportPDF=()=>{
    exportPDF('od-summary','ordem-do-dia.pdf');
  };

  const handleSendEmail=()=>{
    if(!od)return;
    setToast('Enviando email...');
    const emails=(od.equipe||[]).filter(m=>m.email).map(m=>m.email);
    apiCall('sendODEmail',{id:od.id,emails}).then(res=>{
      if(res.success){setToast('Email enviado para '+emails.length+' membros da equipe');}
      else{setToast('Erro ao enviar: '+(res.error||''));}
      setTimeout(()=>setToast(''),3000);
    });
  };

  const handleEditBlock=(item)=>{
    setEditingItem(item);
    setShowEditModal(true);
  };

  const handleSaveBlock=(updated)=>{
    if(!od||!activeDay)return;
    const newCrono={...od.cronograma};
    const idx=newCrono[activeDay].findIndex(b=>b.id===updated.id);
    if(idx>=0){
      newCrono[activeDay][idx]=updated;
      newCrono[activeDay]=recalcTimes(newCrono[activeDay],idx);
      setOD({...od,cronograma:newCrono});
    }
    setShowEditModal(false);
  };

  const handleTeamUpdate=(members)=>{
    setOD(o=>({...o,equipe:members}));
  };

  if(!user)return <LoginScreen onLogin={handleLogin}/>;
  if(!od)return(
    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-6">
      <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm text-center animate-fade">
        <div className="text-4xl mb-4">📋</div>
        <h1 className="text-xl font-bold text-dark mb-2">Bem-vindo ao OD</h1>
        <p className="text-gray-600 text-sm mb-6">Crie uma nova Ordem do Dia ou selecione uma existente</p>
        <div className="space-y-3">
          <button onClick={()=>setShowNewOD(true)} className="w-full bg-accent hover:bg-accentHover text-white rounded-xl py-3 px-4 font-semibold tap-scale transition-all">
            ➕ Nova OD
          </button>
          {user.role===ROLES.ADMIN&&(
            <button onClick={()=>setShowHistory(true)} className="w-full bg-navy hover:bg-deep text-white rounded-xl py-3 px-4 font-semibold tap-scale transition-all">
              📋 Histórico
            </button>
          )}
        </div>
      </div>
      {showNewOD&&<NewODModal onClose={()=>setShowNewOD(false)} onCreate={handleCreateOD}/>}
      {showHistory&&<HistoryModal historico={historico} onClose={()=>setShowHistory(false)} onSelect={(h)=>{
        setShowHistory(false);setToast('Carregando OD...');
        apiCall('getOD',{id:h.id}).then(res=>{
          if(res.success&&res.data){
            const d=typeof res.data.dados_json==='string'?JSON.parse(res.data.dados_json):res.data;
            setOD(d);setActiveDay(d.dias?.[0]?.data||'');
            window.history.pushState({},'',`?od=${h.id}`);
            setToast('');
          }else{setToast('Erro ao carregar OD');setTimeout(()=>setToast(''),3000);}
        });
      }}/>}
    </div>
  );

  const currentDay=activeDay&&od.cronograma[activeDay]?od.cronograma[activeDay]:[];

  return(
    <ErrorBoundary>
    <div className="min-h-screen bg-gray-50 pb-20">
      <div className="sticky top-0 z-40 bg-gradient-to-r from-dark via-navy to-deep text-white shadow-lg">
        <div className="max-w-6xl mx-auto px-4 py-4">
          <div className="flex items-center justify-between mb-3">
            <div className="font-black text-sm">CONTEÚDO URBANO</div>
            <div className="flex items-center gap-2 text-sm">
              {user.role===ROLES.ADMIN&&(
                <>
                  <button onClick={()=>setShowTeamMgr(true)} className="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg transition-all text-xs font-semibold">
                    👥 Equipe
                  </button>
                  <button onClick={handleSaveOD} className="bg-emerald-500 hover:bg-emerald-600 px-3 py-1.5 rounded-lg transition-all text-xs font-semibold">
                    💾 Salvar
                  </button>
                </>
              )}
              <Avatar name={user.name} size="w-8 h-8" textSize="text-xs"/>
            </div>
          </div>
          <div className="flex items-start justify-between">
            <div>
              <h1 className="text-lg font-bold">{od.projeto.nome}</h1>
              <p className="text-white/70 text-xs">Cliente: {od.projeto.cliente}</p>
            </div>
            {user.role===ROLES.ADMIN&&(
              <button onClick={()=>setShowWelcome(true)} className="bg-accent hover:bg-accentHover text-white text-xs font-semibold px-3 py-1.5 rounded-lg tap-scale transition-all">
                📄 Resumo
              </button>
            )}
          </div>
        </div>
      </div>

      <div className="sticky top-[88px] z-30 bg-white shadow-sm">
        <div className="max-w-6xl mx-auto px-4 py-3 overflow-x-auto hide-scroll flex gap-2">
          {od.dias.map(dia=>(
            <DayTab key={dia.data} dia={dia} active={activeDay===dia.data} onClick={()=>setActiveDay(dia.data)}/>
          ))}
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-4 py-6">
        {activeDay&&(
          <div>
            <h2 className="text-sm font-bold text-gray-500 uppercase mb-3">Cronograma - {od.dias.find(d=>d.data===activeDay)?.label}</h2>
            <div className="relative">
              <div className="timeline-line"></div>
              {currentDay.map(item=>(
                <TimelineBlock key={item.id} item={item} isAdmin={user.role===ROLES.ADMIN} onEdit={handleEditBlock}/>
              ))}
            </div>
            {user.role===ROLES.ADMIN&&(
              <button onClick={()=>{
                const newItem={id:genId(),inicio:'18:00',nome:'Nova Atividade',duracao:'01:00',obs:'',termino:'19:00',status:'pendente',imagens:[]};
                const newCrono={...od.cronograma,[activeDay]:[...currentDay,newItem]};
                setOD({...od,cronograma:newCrono});
              }} className="mt-4 w-full bg-dark hover:bg-navy text-white py-2.5 px-4 rounded-xl font-semibold tap-scale transition-all text-sm">
                + Adicionar Atividade
              </button>
            )}
          </div>
        )}
      </div>

      {showWelcome&&<WelcomePopup data={od} onClose={()=>setShowWelcome(false)} onExport={handleExportPDF} onSendEmail={handleSendEmail}/>}
      {showNewOD&&<NewODModal onClose={()=>setShowNewOD(false)} onCreate={handleCreateOD}/>}
      {showTeamMgr&&<TeamManager equipe={od.equipe} onUpdate={handleTeamUpdate} onClose={()=>setShowTeamMgr(false)}/>}
      {showHistory&&<HistoryModal historico={historico} onClose={()=>setShowHistory(false)} onSelect={(h)=>{
        setShowHistory(false);setToast('Carregando OD...');
        apiCall('getOD',{id:h.id}).then(res=>{
          if(res.success&&res.data){
            const d=typeof res.data.dados_json==='string'?JSON.parse(res.data.dados_json):res.data;
            setOD(d);setActiveDay(d.dias?.[0]?.data||'');
            window.history.pushState({},'',`?od=${h.id}`);
            setToast('');
          }else{setToast('Erro ao carregar OD');setTimeout(()=>setToast(''),3000);}
        });
      }}/>}
      {showEditModal&&editingItem&&<EditModal item={editingItem} onSave={handleSaveBlock} onClose={()=>setShowEditModal(false)}/>}

      {toast&&(
        <div className="fixed bottom-6 left-4 right-4 bg-emerald-500 text-white rounded-xl p-4 shadow-lg animate-fade text-sm font-medium">
          {toast}
        </div>
      )}
    </div>
    </ErrorBoundary>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
