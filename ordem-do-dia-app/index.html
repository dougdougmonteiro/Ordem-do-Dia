const genId=()=>Math.random().toString(36).slice(2,10);
const initials=(name)=>{const p=name.split(' ');return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():name.slice(0,2).toUpperCase();};
const timeToMin=(t)=>{if(!t)return 0;const[h,m]=(t+'').split(':').map(Number);return(h||0)*60+(m||0);};
const minToTime=(m)=>{const h=Math.floor(m/60);const mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');};
const calcTermino=(inicio,duracao)=>minToTime(timeToMin(inicio)+timeToMin(duracao));
const recalcTimes=(blocks,fromIndex)=>{const r=[...blocks];for(let i=fromIndex;i<r.length;i++){const it={...r[i]};if(i>0&&i===fromIndex){it.termino=calcTermino(it.inicio,it.duracao);}else if(i>0){const prev=r[i-1];it.inicio=prev.termino;it.termino=calcTermino(it.inicio,it.duracao);}else{it.termino=calcTermino(it.inicio,it.duracao);}r[i]=it;}return r;};
const autoDetectLate=(blocks)=>{const now=new Date();const cur=now.getHours()*60+now.getMinutes();return blocks.map(it=>{if(it.status==='pendente'&&timeToMin(it.inicio)<cur)return{...it,status:'atrasado'};return it;});};
const weatherIcon=(code)=>{const map={'01':'☀️','02':'⛅','03':'☁️','04':'☁️','09':'🌧️','10':'🌦️','11':'⛈️','13':'❄️','50':'🌫️'};return map[(code||'01').slice(0,2)]||'☀️';};
const isLate=(hora,esperado)=>{if(!hora||!esperado)return false;return timeToMin(hora)>timeToMin(esperado);};
const statusIcon=(s)=>{const m={pendente:'⏳',em_andamento:'▶️',concluido:'✅',atrasado:'🔴'};return m[s]||'⏳';};
const tipoColor=(tipo)=>{if(!tipo)return'bg-gray-100 text-gray-600';const t=tipo.toUpperCase();if(t.includes('GRAVAÇÃO'))return'bg-accent/20 text-accent';if(t.includes('DESLOC'))return'bg-blue-100 text-blue-700';return'bg-gray-100 text-gray-600';};
const exportPDF=(elementId,filename)=>{const el=document.getElementById(elementId);if(!el){alert('Área não encontrada para exportar');return;}html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff'}).then(canvas=>{const{jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');const w=pdf.internal.pageSize.getWidth();const h=(canvas.height*w)/canvas.width;pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,w,h);pdf.save(filename||'ordem-do-dia.pdf');}).catch(err=>alert('Erro ao gerar PDF: '+err.message));};

function Avatar({name,size='w-9 h-9',textSize='text-xs'}){
  const colors=['bg-accent','bg-deep','bg-navy','bg-emerald-600','bg-violet-600','bg-amber-600','bg-rose-600','bg-teal-600'];
  const ci=name.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%colors.length;
  return(<div className={`${size} ${colors[ci]} rounded-full flex items-center justify-center text-white font-semibold ${textSize} shrink-0`}>{initials(name)}</div>);
}

// -- Login Screen --

    <div className="min-h-screen bg-gradient-to-br from-dark via-navy to-deep flex items-center justify-center p-6">

function DayTab({dia,active,onClick}){

// -- Timeline Block --
function TimelineBlock({item,isLive,isAdmin,onEdit}){
  const isAtrasado=item.status==='atrasado';
  return(
    <div className={`relative pl-14 pr-4 py-3 mb-3 animate-fade ${isAdmin?'tap-scale cursor-pointer':''}`} onClick={()=>isAdmin&&onEdit(item)}>
      <div className={`absolute left-5 top-5 w-7 h-7 rounded-full flex items-center justify-center text-sm z-10 shadow
        ${item.status==='concluido'?'bg-emerald-500 text-white':isLive?'bg-accent text-white count-pulse':isAtrasado?'bg-late text-white count-pulse':'bg-gray-200 text-gray-500'}`}>
        {item.status==='concluido'?'✓':isLive?'▶':isAtrasado?'!':'○'}
      </div>
      <div className={`rounded-xl p-4 transition-all shadow-sm
        ${isLive?'bg-white border-2 border-accent pulse-live shadow-lg':isAtrasado?'bg-lateLight border-2 border-late pulse-late shadow-lg':'bg-white border border-gray-100 hover:shadow-md'}`}>
        {isLive&&<span className="inline-block bg-accent text-white text-xs font-bold px-2 py-0.5 rounded-full mb-2 animate-pulse">AO VIVO</span>}
        {isAtrasado&&<span className="inline-block bg-late text-white text-xs font-bold px-2 py-0.5 rounded-full mb-2">ATRASADO</span>}
        {item.adicionado_depois&&<span className="inline-block bg-violet-500 text-white text-xs font-bold px-2 py-0.5 rounded-full mb-2 ml-1">NOVO</span>}
        <div className="flex items-start justify-between gap-3">
          <div className="flex-1">
            <div className="flex items-center gap-2 mb-1">
              <span className="text-lg font-bold text-dark">{item.inicio}</span>
              {item.termino&&<span className="text-gray-400 text-sm">→ {item.termino}</span>}
            </div>

// -- Live Timer --
function LiveTimer({item}){
  const[now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  if(!item)return null;
  const startMin=timeToMin(item.inicio);const durMin=timeToMin(item.duracao);const endMin=startMin+durMin;
  const currentMin=now.getHours()*60+now.getMinutes();
  const elapsed=Math.max(0,currentMin-startMin);const remaining=Math.max(0,endMin-currentMin);
  const progress=durMin>0?Math.min(100,(elapsed/durMin)*100):0;
  const remColor=remaining<=5?'text-red-500 count-pulse':remaining<=15?'text-amber-500':'text-emerald-500';
  return(
    <div className="fixed bottom-0 left-0 right-0 glass border-t border-gray-200 p-3 animate-slide-up z-50 no-print">
      <div className="max-w-lg mx-auto">
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-center gap-2"><span className="w-2 h-2 bg-accent rounded-full animate-pulse"/><span className="text-xs font-semibold text-accent uppercase">Ao Vivo</span></div>
          <span className={`text-sm font-bold ${remColor}`}>{minToTime(remaining)} restante</span>
        </div>
        <h4 className="font-bold text-dark text-sm truncate">{item.nome}</h4>
        <div className="flex items-center gap-2 mt-1 text-xs text-gray-500">
          <span>{item.inicio}</span>
          <div className="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden"><div className="h-full bg-accent rounded-full transition-all" style={{width:`${progress}%`}}/></div>
          <span>{item.termino}</span>
        </div>
      </div>
    </div>
  );
}

// -- New OD Template Modal --
function NewODModal({onClose,onCreate}){
  const SEMANA=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const TIPOS=['DESLOCAMENTO','GRAVAÇÃO','PÓS-PRODUÇÃO','REUNIÃO','PREPARAÇÃO','OUTRO'];
  const[step,setStep]=useState(1);
  const[nome,setNome]=useState('');
  const[cliente,setCliente]=useState('');
  const[cidade,setCidade]=useState('');
  const[inicio,setInicio]=useState('');
  const[fim,setFim]=useState('');
  const[locNome,setLocNome]=useState('');
  const[locEnd,setLocEnd]=useState('');
  const[locacoes,setLocacoes]=useState([]);
  const[dias,setDias]=useState([]);
  const[err,setErr]=useState('');

  const generateDias=()=>{
    if(!inicio||!fim)return[];
    const d1=new Date(inicio+'T12:00:00');const d2=new Date(fim+'T12:00:00');
    const result=[];let i=0;
    for(let d=new Date(d1);d<=d2;d.setDate(d.getDate()+1)){
      const dd=String(d.getDate()).padStart(2,'0');
      const label=`${dd}/${MESES[d.getMonth()]}`;
      const semana=SEMANA[d.getDay()];
      result.push({data:`dia${i}`,label,semana,tipo:'GRAVAÇÃO',locacao:''});
      i++;
    }
    return result;
  };

  const goStep2=()=>{
    if(!nome||!cliente||!inicio||!fim){setErr('Preencha todos os campos');return;}
    if(new Date(fim)<new Date(inicio)){setErr('Data fim deve ser após data início');return;}
    const d=generateDias();
    if(d.length>14){setErr('Máximo 14 dias por OD');return;}
    setDias(d);setErr('');setStep(2);
  };

  const addLoc=()=>{
    if(!locNome.trim())return;
    setLocacoes(p=>[...p,{id:genId(),nome:locNome.trim(),endereco:locEnd.trim(),tipo:'locacao',observacao:`Locação ${p.length+1}`}]);
    setLocNome('');setLocEnd('');
  };

  const removeLoc=(id)=>setLocacoes(p=>p.filter(l=>l.id!==id));

  const updateDia=(idx,field,val)=>{
    setDias(p=>{const n=[...p];n[idx]={...n[idx],[field]:val};return n;});
  };

  const handleCreate=()=>{
    const crono={};
    dias.forEach(d=>{crono[d.data]=[{id:genId(),inicio:'09:00',nome:'PRIMEIRA ATIVIDADE',duracao:'01:00',obs:'',termino:'10:00',status:'pendente',imagens:[]}];});
    onCreate({
      projeto:{nome,cliente,campanha:`${nome} - ${cidade}`,locacoes_texto:locacoes.map(l=>l.nome).join(' / '),logo_cliente:null},
      equipe:[],
      locacoes,
      dias,
      clima:dias.map(d=>({data:d.data,min:0,max:0,chuva:0,desc:'--',icon:'01d',cidade:cidade||''})),
      cronograma:crono,
      checkins:[],
      historico:[],
    });
  };

  const inp='w-full border-2 border-gray-200 focus:border-accent rounded-xl px-3 py-2.5 text-sm focus:outline-none transition-colors';

  return(
    <div className="fixed inset-0 bg-black/50 flex items-end sm:items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-md max-h-[90vh] overflow-auto p-6 animate-slide-up" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-lg font-bold">{step===1?'➕ Nova Ordem do Dia':'📋 Configurar Dias'}</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        {err&&<div className="bg-red-50 text-red-600 text-sm rounded-lg p-3 mb-3">{err}</div>}

        {step===1&&(
          <div className="space-y-3">
            <div><label className="text-xs font-semibold text-gray-500 block mb-1">Nome do Projeto *</label>
              <input className={inp} value={nome} onChange={e=>setNome(e.target.value)} placeholder="Ex: CAMPANHA VERÃO 2026"/></div>
            <div><label className="text-xs font-semibold text-gray-500 block mb-1">Cliente *</label>
              <input className={inp} value={cliente} onChange={e=>setCliente(e.target.value)} placeholder="Ex: Janssen / Johnson & Johnson"/></div>
            <div><label className="text-xs font-semibold text-gray-500 block mb-1">Cidade</label>
              <input className={inp} value={cidade} onChange={e=>setCidade(e.target.value)} placeholder="Ex: São Paulo"/></div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="text-xs font-semibold text-gray-500 block mb-1">Data Início *</label>
                <input type="date" className={inp} value={inicio} onChange={e=>setInicio(e.target.value)}/></div>
              <div><label className="text-xs font-semibold text-gray-500 block mb-1">Data Fim *</label>
                <input type="date" className={inp} value={fim} onChange={e=>setFim(e.target.value)}/></div>
            </div>
            <div className="pt-2">
              <label className="text-xs font-semibold text-gray-500 block mb-2">Locações (opcional)</label>
              <div className="flex gap-2 mb-2">
                <input className={`${inp} flex-1`} value={locNome} onChange={e=>setLocNome(e.target.value)} placeholder="Nome da locação"/>

              {locNome&&<input className={`${inp} mb-2`} value={locEnd} onChange={e=>setLocEnd(e.target.value)} placeholder="Endereço (opcional)"/>}
              {locacoes.length>0&&(
                <div className="space-y-1">
                  {locacoes.map(l=>(
                    <div key={l.id} className="flex items-center gap-2 bg-blue-50 rounded-lg px-3 py-2 text-sm">
                      <span className="flex-1">📍 {l.nome}</span>
                      <button onClick={()=>removeLoc(l.id)} className="text-red-400 hover:text-red-600 font-bold">×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <button onClick={goStep2} className="w-full mt-2 bg-accent hover:bg-accentHover text-white font-semibold py-3 rounded-xl tap-scale transition-all">
              Próximo: Configurar Dias →
            </button>
          </div>
        )}

        {step===2&&(
          <div className="space-y-3">
            <p className="text-xs text-gray-400 mb-1">{dias.length} dia(s) · Defina o tipo de cada dia</p>
            {dias.map((d,i)=>(
              <div key={d.data} className="bg-gray-50 rounded-xl p-3">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-bold">{d.label} — {d.semana}</span>
                </div>
                <select value={d.tipo} onChange={e=>updateDia(i,'tipo',e.target.value)}
                  className="w-full border rounded-lg px-3 py-2 text-sm bg-white mb-2">
                  {TIPOS.map(t=><option key={t} value={t}>{t}</option>)}
                </select>
                {locacoes.length>0&&(
                  <select value={d.locacao||''} onChange={e=>updateDia(i,'locacao',e.target.value)}
                    className="w-full border rounded-lg px-3 py-2 text-sm bg-white">
                    <option value="">Sem locação definida</option>
                    {locacoes.map(l=><option key={l.id} value={l.nome}>{l.nome}</option>)}
                  </select>
                )}
              </div>
            ))}
            <div className="flex gap-2 pt-2">
              <button onClick={()=>setStep(1)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-dark font-medium py-3 rounded-xl tap-scale transition-all">← Voltar</button>
              <button onClick={handleCreate} className="flex-1 bg-accent hover:bg-accentHover text-white font-semibold py-3 rounded-xl tap-scale transition-all">
                Criar OD ✓
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════
function App(){
  const[user,setUser]=useState(null);
  const[data,setData]=useState(null);
  const[cronograma,setCronograma]=useState({});
  const[checkins,setCheckins]=useState([]);
  const[selectedDay,setSelectedDay]=useState('dia2');
  const[showEdit,setShowEdit]=useState(null);
  const[showCheckin,setShowCheckin]=useState(false);
  const[showNotif,setShowNotif]=useState(false);
  const[showTeam,setShowTeam]=useState(false);
  const[showWelcome,setShowWelcome]=useState(false);
  const[showReport,setShowReport]=useState(false);
  const[showHistory,setShowHistory]=useState(false);
  const[showNewOD,setShowNewOD]=useState(false);
  const[saved,setSaved]=useState(false);
  const[time,setTime]=useState(new Date());

  const isAdmin=user?.role===ROLES.ADMIN;

  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);

  // Auto-detect late blocks every 30s
  useEffect(()=>{
    if(!user)return;
    const check=()=>{
      setCronograma(prev=>{
        const updated={};
        Object.entries(prev).forEach(([day,blocks])=>{updated[day]=autoDetectLate(blocks);});
        return updated;
      });
    };
    check();
    const t=setInterval(check,30000);
    return()=>clearInterval(t);
  },[user]);

  useEffect(()=>{
    if(!user)return;
    setData({projeto:MOCK.projeto,equipe:MOCK.equipe,locacoes:MOCK.locacoes,dias:MOCK.dias,clima:MOCK.clima});
    setCronograma({...MOCK.cronograma});
    setCheckins([...MOCK.checkins]);
    setShowWelcome(true);
  },[user]);

  const todayCrono=cronograma[selectedDay]||[];
  const liveItem=todayCrono.find(c=>c.status==='em_andamento');
  const pendingCount=todayCrono.filter(c=>c.status==='pendente'||c.status==='atrasado').length;
  const totalBlocks=todayCrono.length;
  const doneBlocks=todayCrono.filter(c=>c.status==='concluido').length;
  const dayProgress=totalBlocks>0?((doneBlocks+(liveItem?0.5:0))/totalBlocks)*100:0;

  const handleSave=(updated)=>{
    setCronograma(prev=>{
      const newC={...prev};
      const blocks=[...(newC[selectedDay]||[])];
      const idx=blocks.findIndex(b=>b.id===updated.id);
      if(idx>=0){blocks[idx]=updated;newC[selectedDay]=recalcTimes(blocks,idx);}
      return newC;
    });
    setShowEdit(null);setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const handleDelete=(id)=>{
    setCronograma(prev=>{const newC={...prev};newC[selectedDay]=(newC[selectedDay]||[]).filter(b=>b.id!==id);return newC;});
    setShowEdit(null);setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const handleAddBlock=()=>{
    const last=todayCrono[todayCrono.length-1];
    const startTime=last?last.termino:'09:00';
    const newBlock={id:genId(),inicio:startTime,nome:'NOVA ATIVIDADE',duracao:'01:00',obs:'',termino:calcTermino(startTime,'01:00'),status:'pendente',imagens:[],adicionado_depois:true};
    setCronograma(prev=>({...prev,[selectedDay]:[...(prev[selectedDay]||[]),newBlock]}));
  };

  const handleCheckIn=()=>{
    if(!user)return;
    const already=checkins.find(c=>c.email===user.email);
    if(already)return;
    const nowStr=`${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`;
    const firstBlock=todayCrono[0];
    const expected=firstBlock?firstBlock.inicio:'09:00';
    setCheckins(prev=>[...prev,{nome:user.name,funcao:'Equipe',horario:nowStr,email:user.email,horario_esperado:expected}]);
  };

  const handleExportPDF=()=>exportPDF('timeline-area',`od-${selectedDay}.pdf`);

  if(!user)return<LoginScreen onLogin={setUser}/>;
  if(!data)return<div className="min-h-screen flex items-center justify-center"><div className="text-gray-400">Carregando...</div></div>;

  const currentDia=data.dias.find(d=>d.data===selectedDay);
  const currentClima=data.clima.find(c=>c.data===selectedDay);

  return(
    <div className="min-h-screen bg-gray-50 pb-24">
      {showWelcome&&<WelcomePopup data={data} onClose={()=>setShowWelcome(false)}/>}
      <header className="bg-gradient-to-r from-dark via-navy to-deep text-white sticky top-0 z-40 no-print">
        <div className="max-w-lg mx-auto px-4 py-3">
          <div className="flex items-center justify-between">
            {LOGO_WHITE?<img src={LOGO_WHITE} alt="CU" className="h-7 object-contain"/>:<span className="text-sm font-black text-white tracking-tight">CONTEÚDO URBANO</span>}
            <div className="flex items-center gap-1.5">
              {isAdmin&&<span className="text-[10px] bg-accent/30 px-1.5 py-0.5 rounded-full font-medium">Admin</span>}
              <button onClick={()=>setShowNotif(true)} className="relative p-2 tap-scale"><span className="text-lg">🔔</span>
                {pendingCount>0&&<span className="absolute -top-0.5 -right-0.5 bg-accent text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{pendingCount}</span>}</button>
              <button onClick={()=>setShowCheckin(true)} className="relative p-2 tap-scale"><span className="text-lg">📍</span>
                <span className="absolute -top-0.5 -right-0.5 bg-emerald-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{checkins.length}</span></button>
              <button onClick={()=>setShowTeam(true)} className="tap-scale"><Avatar name={user.name} size="w-7 h-7" textSize="text-[10px]"/></button>
            </div>
          </div>
          <div className="mt-2 flex items-center justify-between">
            <div><h1 className="text-sm font-bold">{data.projeto.nome}</h1><p className="text-xs text-white/60">{data.projeto.cliente}</p></div>
            {data.projeto.cliente_logo&&<img src={data.projeto.cliente_logo} alt="Cliente" className="h-6 object-contain opacity-80"/>}
          </div>
          {currentClima&&(
            <div className="flex items-center gap-3 mt-2 bg-white/10 rounded-lg px-3 py-1.5 text-xs">
              <span className="text-lg">{weatherIcon(currentClima.icon)}</span>
              <span className="font-medium">{currentClima.min}°—{currentClima.max}°</span>
              <span className="text-white/60">{currentClima.chuva}mm</span>
              <span className="text-white/50 truncate flex-1">{currentClima.desc}</span>
            </div>
          )}
        </div>
        <div className="h-1 bg-white/10"><div className="h-full bg-accent transition-all duration-1000" style={{width:`${dayProgress}%`}}/></div>
      </header>

      <div className="sticky top-[140px] z-30 bg-gray-50 pt-3 pb-2 px-4 no-print">
        <div className="max-w-lg mx-auto flex gap-2 overflow-x-auto hide-scroll">
          {data.dias.map(dia=><DayTab key={dia.data} dia={dia} active={selectedDay===dia.data} onClick={()=>setSelectedDay(dia.data)}/>)}
        </div>
      </div>

      <div className="max-w-lg mx-auto px-4 mt-2 mb-3 no-print">
        <div className="flex items-center justify-between">
          <div><h2 className="text-lg font-bold text-dark">{currentDia?.semana}, {currentDia?.label}</h2>
            <div className="flex items-center gap-2 mt-1">
              <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${tipoColor(currentDia?.tipo||'')}`}>{currentDia?.tipo}</span>
              {currentDia?.locacao&&<span className="text-xs text-gray-500">{currentDia.locacao}</span>}</div></div>
          <div className="text-right">
            <div className="text-2xl font-bold text-dark tabular-nums">{String(time.getHours()).padStart(2,'0')}:{String(time.getMinutes()).padStart(2,'0')}</div>
            <div className="text-xs text-gray-400">{doneBlocks}/{totalBlocks} concluídos</div></div>
        </div>
      </div>

      <div className="max-w-lg mx-auto px-4 relative" id="timeline-area">
        <div className="timeline-line"/>
        {todayCrono.map(item=><TimelineBlock key={item.id} item={item} isLive={item.status==='em_andamento'} isAdmin={isAdmin} onEdit={setShowEdit}/>)}
        {todayCrono.length===0&&(<div className="text-center py-12 text-gray-400"><span className="text-4xl block mb-3">📋</span>Nenhum quadro para este dia.</div>)}
      </div>

      {isAdmin&&(
        <div className="max-w-lg mx-auto px-4 mt-4 no-print">
          <div className="flex gap-2 flex-wrap">
            <button onClick={handleAddBlock} className="flex-1 bg-accent/10 hover:bg-accent/20 text-accent font-medium py-2.5 rounded-xl tap-scale transition-all text-sm">➕ Adicionar Quadro</button>
            <button onClick={()=>setShowNewOD(true)} className="flex-1 bg-dark hover:bg-navy text-white font-medium py-2.5 rounded-xl tap-scale transition-all text-sm">➕ Nova OD</button>
          </div>
          <div className="flex gap-2 mt-2">
            <button onClick={()=>setShowHistory(true)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-dark font-medium py-2.5 rounded-xl tap-scale transition-all text-sm">📋 Histórico</button>
          </div>
        </div>
      )}

      {liveItem&&<LiveTimer item={liveItem}/>}
      {saved&&(<div className="fixed top-20 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-4 py-2 rounded-full text-sm font-medium shadow-lg animate-fade z-50 no-print">✓ Salvo com sucesso</div>)}
      {showEdit&&<EditModal item={showEdit} onSave={handleSave} onDelete={handleDelete} onClose={()=>setShowEdit(null)} isAdmin={isAdmin}/>}
      {showCheckin&&<CheckInPanel checkins={checkins} equipe={data.equipe} onCheckIn={handleCheckIn} onClose={()=>setShowCheckin(false)} isAdmin={isAdmin}/>}
      {showNotif&&<NotifPanel cronograma={todayCrono} checkins={checkins} isAdmin={isAdmin} onClose={()=>setShowNotif(false)}/>}
      {showTeam&&<TeamPanel equipe={data.equipe} locacoes={data.locacoes} onClose={()=>setShowTeam(false)}/>}
      {showReport&&<ReportModal cronograma={cronograma} checkins={checkins} onClose={()=>setShowReport(false)}/>}
      {showHistory&&<HistoryModal historico={MOCK.historico} onClose={()=>setShowHistory(false)} onSelect={(h)=>{setShowHistory(false);}}/>}
      {showNewOD&&<NewODModal onClose={()=>setShowNewOD(false)} onCreate={(newData)=>{
        setData({projeto:newData.projeto,equipe:newData.equipe,locacoes:newData.locacoes,dias:newData.dias,clima:newData.clima});
        setCronograma({...newData.cronograma});
        setCheckins([]);
        setSelectedDay(newData.dias[0]?.data||'dia0');
        setShowNewOD(false);setShowWelcome(true);setSaved(true);setTimeout(()=>setSaved(false),2000);
      }}/>}
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,info){console.error('React Error:',error,info);}
  render(){if(this.state.hasError)return(<div style={{padding:'40px',textAlign:'center',fontFamily:'Inter,sans-serif'}}><h1 style={{color:'#e94560',fontSize:'24px',marginBottom:'12px'}}>Erro no App</h1><pre style={{background:'#f0f0f0',padding:'16px',borderRadius:'8px',textAlign:'left',overflow:'auto',fontSize:'12px'}}>{this.state.error?.toString()}</pre><button onClick={()=>this.setState({hasError:false,error:null})} style={{marginTop:'16px',background:'#1a1a2e',color:'white',border:'none',padding:'12px 24px',borderRadius:'8px',cursor:'pointer',fontSize:'14px'}}>Tentar Novamente</button></div>);return this.props.children;}
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
