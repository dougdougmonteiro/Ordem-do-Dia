function Avatar({name,size='w-9 h-9',textSize='text-xs'}){
  const colors=['bg-accent','bg-deep','bg-navy','bg-emerald-600','bg-violet-600','bg-amber-600','bg-rose-600','bg-teal-600'];
  const ci=name.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%colors.length;
  return(<div className={`${size} ${colors[ci]} rounded-full flex items-center justify-center text-white font-semibold ${textSize} shrink-0`}>{initials(name)}</div>);
}

// -- Login Screen --
function LoginScreen({onLogin}){
  const[err,setErr]=useState('');
  const[email,setEmail]=useState('');
  const[mode,setMode]=useState('select'); // select, google, client
  const handleDemo=()=>onLogin({name:'Douglas (Admin Demo)',email:'douglas@conteudourbano.com.br',picture:null,demo:true,role:ROLES.ADMIN});
  const handleClientAccess=()=>{
    if(!email.trim()){setErr('Digite seu email');return;}
    onLogin({name:email.split('@')[0],email:email.trim(),picture:null,demo:true,role:ROLES.CLIENTE});
  };
  return(
    <div className="min-h-screen bg-gradient-to-br from-dark via-navy to-deep flex items-center justify-center p-6">
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm animate-fade text-center">
        <div className="flex justify-center mb-4">
          <img src={LOGO_BLACK} alt="Conteúdo Urbano" className="h-14 object-contain"/>
        </div>
        <h1 className="text-xl font-bold text-dark mb-1">Ordem do Dia</h1>
        <p className="text-gray-400 text-sm mb-6">Sistema de Gestão de Set</p>
        {err&&<div className="bg-red-50 text-red-600 text-sm rounded-lg p-3 mb-4">{err}</div>}
        {mode==='select'&&(
          <div className="space-y-3">
            <button onClick={handleDemo} className="w-full bg-dark hover:bg-navy text-white rounded-xl py-3 px-4 font-semibold tap-scale transition-all">
              Entrar como Admin (Demo)
            </button>
            <button onClick={()=>setMode('client')} className="w-full bg-white border-2 border-gray-200 hover:border-accent rounded-xl py-3 px-4 font-medium text-gray-700 tap-scale transition-all">
              Acesso Cliente
            </button>
          </div>
        )}
        {mode==='client'&&(
          <div className="space-y-3">
            <input type="email" placeholder="Seu email" value={email} onChange={e=>setEmail(e.target.value)}
              className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-accent focus:outline-none"/>
            <button onClick={handleClientAccess} className="w-full bg-accent hover:bg-accentHover text-white rounded-xl py-3 px-4 font-semibold tap-scale transition-all">Acessar</button>
            <button onClick={()=>setMode('select')} className="text-sm text-gray-400 hover:text-gray-600">← Voltar</button>
          </div>
        )}
        <p className="text-xs text-gray-400 mt-6">Equipe: @conteudourbano.com.br · Clientes: qualquer email</p>
      </div>
    </div>
  );
}

// -- Welcome Popup with OD Summary --
function WelcomePopup({data,onClose}){
  if(!data)return null;
  return(
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-auto animate-fade" onClick={e=>e.stopPropagation()} id="od-summary">
        <div className="bg-gradient-to-r from-dark via-navy to-deep text-white p-6 rounded-t-2xl">
          <div className="flex items-center justify-between mb-3">
            <img src={LOGO_WHITE} alt="CU" className="h-8 object-contain"/>
            {data.projeto.cliente_logo&&<img src={data.projeto.cliente_logo} alt="Cliente" className="h-8 object-contain"/>}
          </div>
          <h2 className="text-lg font-bold">ORDEM DO DIA</h2>
          <p className="text-white/80 text-sm">{data.projeto.nome}</p>
          <p className="text-white/60 text-xs mt-1">Cliente: {data.projeto.cliente}</p>
        </div>
        <div className="p-6">
          <h3 className="font-bold text-sm text-gray-500 uppercase mb-3">📍 Locações</h3>
          <div className="space-y-2 mb-5">
            {data.locacoes.map(l=>(
              <a key={l.id} href={`https://maps.google.com/?q=${encodeURIComponent(l.endereco)}`} target="_blank" rel="noopener"
                className={`block p-3 rounded-xl transition-all ${l.tipo==='hospital'?'bg-red-50 hover:bg-red-100 border border-red-200':'bg-blue-50 hover:bg-blue-100 border border-blue-200'}`}>
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-lg">{l.tipo==='hospital'?'🏥':'📍'}</span>
                  <span className="text-sm font-bold">{l.nome}</span>
                  <span className="text-xs text-gray-400 ml-auto">{l.observacao}</span>
                </div>
                <p className="text-xs text-gray-600 pl-7">{l.endereco}</p>
              </a>
            ))}
          </div>
          <h3 className="font-bold text-sm text-gray-500 uppercase mb-3">👥 Equipe ({data.equipe.length})</h3>
          <div className="grid grid-cols-2 gap-2 mb-5">
            {data.equipe.map(m=>(
              <div key={m.id} className="flex items-center gap-2 p-2 bg-gray-50 rounded-lg">
                <Avatar name={m.nome} size="w-7 h-7" textSize="text-[10px]"/>
                <div className="min-w-0"><div className="text-xs font-medium truncate">{m.nome}</div><div className="text-[10px] text-gray-400">{m.funcao}</div></div>
              </div>
            ))}
          </div>
          <h3 className="font-bold text-sm text-gray-500 uppercase mb-3">📅 Cronograma Resumido</h3>
          <div className="space-y-2 mb-5">
            {data.dias.map(d=>(
              <div key={d.data} className="flex items-center gap-3 p-2 bg-gray-50 rounded-lg">
                <span className={`text-xs px-2 py-1 rounded-full font-semibold ${tipoColor(d.tipo)}`}>{d.label}</span>
                <div><div className="text-xs font-medium">{d.semana} - {d.tipo}</div>{d.locacao&&<div className="text-[10px] text-gray-400">{d.locacao}</div>}</div>
              </div>
            ))}
          </div>
          <div className="flex gap-2">
            <button onClick={()=>exportPDF('od-summary','resumo-od.pdf')} className="flex-1 bg-gray-100 hover:bg-gray-200 text-dark rounded-xl py-3 px-4 font-medium tap-scale transition-all text-sm">
              📄 Exportar PDF
            </button>
            <button onClick={onClose} className="flex-1 bg-accent hover:bg-accentHover text-white rounded-xl py-3 px-4 font-semibold tap-scale transition-all text-sm">
              Entrar no App
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// -- Day Tab --
function DayTab({dia,active,onClick}){
  return(
    <button onClick={onClick}
      className={`shrink-0 rounded-xl px-4 py-2.5 tap-scale transition-all ${active?'bg-dark text-white shadow-lg scale-105':'bg-white text-gray-600 hover:bg-gray-50 shadow'}`}>
      <div className="text-sm font-bold">{dia.label}</div>
      <div className="text-xs opacity-70">{dia.semana}</div>
      <div className={`text-xs mt-1 px-2 py-0.5 rounded-full font-medium inline-block ${(dia.tipo||'').includes('GRAVAÇÃO')?'bg-accent/20 text-accent':'bg-blue-100 text-blue-700'}`}>{dia.tipo}</div>
    </button>
  );
}

// -- Timeline Block --
function TimelineBlock({item,isLive,isAdmin,onEdit}){
  const isAtrasado=item.status==='atrasado';
  return(
    <div className={`relative pl-14 pr-4 py-3 mb-3 animate-fade ${isAdmin?'tap-scale cursor-pointer':''}`} onClick={()=>isAdmin&&onEdit(item)}>
      <div className={`absolute left-5 top-5 w-7 h-7 rounded-full flex items-center justify-center text-sm z-10 shadow
        ${item.status==='concluido'?'bg-emerald-500 text-white':isLive?'bg-accent text-white count-pulse':isAtrasado?'bg-late text-white count-pulse':'bg-gray-200 text-gray-500'}`}>
        {item.status==='concluido'?'✓':isLive?'▶':isAtrasado?'!':'○'}
      </div>
      <div className={`rounded-xl p-4 transition-all shadow-sm
        ${isLive?'bg-white border-2 border-accent pulse-live shadow-lg':isAtrasado?'bg-lateLight border-2 border-late pulse-late shadow-lg':'bg-white border border-gray-100 hover:shadow-md'}`}>
        {isLive&&<span className="inline-block bg-accent text-white text-xs font-bold px-2 py-0.5 rounded-full mb-2 animate-pulse">AO VIVO</span>}
        {isAtrasado&&<span className="inline-block bg-late text-white text-xs font-bold px-2 py-0.5 rounded-full mb-2">ATRASADO</span>}
        {item.adicionado_depois&&<span className="inline-block bg-violet-500 text-white text-xs font-bold px-2 py-0.5 rounded-full mb-2 ml-1">NOVO</span>}
        <div className="flex items-start justify-between gap-3">

// -- Live Timer --
function LiveTimer({item}){
  const[now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  if(!item)return null;
  const startMin=timeToMin(item.inicio);const durMin=timeToMin(item.duracao);const endMin=startMin+durMin;
  const currentMin=now.getHours()*60+now.getMinutes();
  const elapsed=Math.max(0,currentMin-startMin);const remaining=Math.max(0,endMin-currentMin);
  const progress=durMin>0?Math.min(100,(elapsed/durMin)*100):0;
  const remColor=remaining<=5?'text-red-500 count-pulse':remaining<=15?'text-amber-500':'text-emerald-500';
  return(
    <div className="fixed bottom-0 left-0 right-0 glass border-t border-gray-200 p-3 animate-slide-up z-50 no-print">
      <div className="max-w-lg mx-auto">
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-center gap-2"><span className="w-2 h-2 bg-accent rounded-full animate-pulse"/><span className="text-xs font-semibold text-accent uppercase">Ao Vivo</span></div>
          <span className={`text-sm font-bold ${remColor}`}>{minToTime(remaining)} restante</span>
        </div>
        <h4 className="font-bold text-dark text-sm truncate">{item.nome}</h4>
        <div className="flex items-center gap-2 mt-1 text-xs text-gray-500">
          <span>{item.inicio}</span>
          <div className="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden"><div className="h-full bg-accent rounded-full transition-all" style={{width:`${progress}%`}}/></div>
          <span>{item.termino}</span>
        </div>
      </div>
    </div>
  );
}

// MAIN APP
// ═══════════════════════════════════════════
function App(){
  const[user,setUser]=useState(null);
  const[data,setData]=useState(null);
  const[cronograma,setCronograma]=useState({});
  const[checkins,setCheckins]=useState([]);
  const[selectedDay,setSelectedDay]=useState('2025-03-06');
  const[showEdit,setShowEdit]=useState(null);
  const[showCheckin,setShowCheckin]=useState(false);
  const[showNotif,setShowNotif]=useState(false);
  const[showTeam,setShowTeam]=useState(false);
  const[showWelcome,setShowWelcome]=useState(false);
  const[showReport,setShowReport]=useState(false);
  const[showHistory,setShowHistory]=useState(false);
  const[showNewOD,setShowNewOD]=useState(false);
  const[saved,setSaved]=useState(false);
  const[time,setTime]=useState(new Date());

  const isAdmin=user?.role===ROLES.ADMIN;

  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);

  // Auto-detect late blocks every 30s
  useEffect(()=>{
    if(!user)return;
    const check=()=>{
      setCronograma(prev=>{
        const updated={};
        Object.entries(prev).forEach(([day,blocks])=>{updated[day]=autoDetectLate(blocks);});
        return updated;
      });
    };
    check();
    const t=setInterval(check,30000);
    return()=>clearInterval(t);
  },[user]);

  useEffect(()=>{
    if(!user)return;
    setData({projeto:MOCK.projeto,equipe:MOCK.equipe,locacoes:MOCK.locacoes,dias:MOCK.dias,clima:MOCK.clima});
    setCronograma({...MOCK.cronograma});
    setCheckins([...MOCK.checkins]);
    setShowWelcome(true);
  },[user]);

  const todayCrono=cronograma[selectedDay]||[];
  const liveItem=todayCrono.find(c=>c.status==='em_andamento');
  const pendingCount=todayCrono.filter(c=>c.status==='pendente'||c.status==='atrasado').length;
  const totalBlocks=todayCrono.length;
  const doneBlocks=todayCrono.filter(c=>c.status==='concluido').length;
  const dayProgress=totalBlocks>0?((doneBlocks+(liveItem?0.5:0))/totalBlocks)*100:0;

  const handleSave=(updated)=>{
    setCronograma(prev=>{
      const newC={...prev};
      const blocks=[...(newC[selectedDay]||[])];
      const idx=blocks.findIndex(b=>b.id===updated.id);
      if(idx>=0){blocks[idx]=updated;newC[selectedDay]=recalcTimes(blocks,idx);}
      return newC;
    });
    setShowEdit(null);setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const handleDelete=(id)=>{
    setCronograma(prev=>{const newC={...prev};newC[selectedDay]=(newC[selectedDay]||[]).filter(b=>b.id!==id);return newC;});
    setShowEdit(null);setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const handleAddBlock=()=>{
    const last=todayCrono[todayCrono.length-1];
    const startTime=last?last.termino:'09:00';
    const newBlock={id:genId(),inicio:startTime,nome:'NOVA ATIVIDADE',duracao:'01:00',obs:'',termino:calcTermino(startTime,'01:00'),status:'pendente',imagens:[],adicionado_depois:true};
    setCronograma(prev=>({...prev,[selectedDay]:[...(prev[selectedDay]||[]),newBlock]}));
  };

  const handleCheckIn=()=>{
    if(!user)return;
    const already=checkins.find(c=>c.email===user.email);
    if(already)return;
    const nowStr=`${String(time.getHours()).padStart(2,'0')}:${String(time.getMinutes()).padStart(2,'0')}`;
    const firstBlock=todayCrono[0];
    const expected=firstBlock?firstBlock.inicio:'09:00';
    setCheckins(prev=>[...prev,{nome:user.name,funcao:'Equipe',horario:nowStr,email:user.email,horario_esperado:expected}]);
  };

  const handleExportPDF=()=>exportPDF('timeline-area',`od-${selectedDay}.pdf`);

  if(!user)return<LoginScreen onLogin={setUser}/>;
  if(!data)return<div className="min-h-screen flex items-center justify-center"><div className="text-gray-400">Carregando...</div></div>;

  const currentDia=data.dias.find(d=>d.data===selectedDay);
  const currentClima=data.clima.find(c=>c.data===selectedDay);

  return(
    <div className="min-h-screen bg-gray-50 pb-24">
      {showWelcome&&<WelcomePopup data={data} onClose={()=>setShowWelcome(false)}/>}
      <header className="bg-gradient-to-r from-dark via-navy to-deep text-white sticky top-0 z-40 no-print">
        <div className="max-w-lg mx-auto px-4 py-3">
          <div className="flex items-center justify-between">
            <img src={LOGO_WHITE} alt="CU" className="h-7 object-contain"/>
            <div className="flex items-center gap-1.5">
              {isAdmin&&<span className="text-[10px] bg-accent/30 px-1.5 py-0.5 rounded-full font-medium">Admin</span>}
              <button onClick={()=>setShowNotif(true)} className="relative p-2 tap-scale"><span className="text-lg">🔔</span>
                {pendingCount>0&&<span className="absolute -top-0.5 -right-0.5 bg-accent text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{pendingCount}</span>}</button>
              <button onClick={()=>setShowCheckin(true)} className="relative p-2 tap-scale"><span className="text-lg">📍</span>
                <span className="absolute -top-0.5 -right-0.5 bg-emerald-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{checkins.length}</span></button>
              <button onClick={()=>setShowTeam(true)} className="tap-scale"><Avatar name={user.name} size="w-7 h-7" textSize="text-[10px]"/></button>
            </div>
          </div>
          <div className="mt-2 flex items-center justify-between">
            <div><h1 className="text-sm font-bold">{data.projeto.nome}</h1><p className="text-xs text-white/60">{data.projeto.cliente}</p></div>
            {data.projeto.cliente_logo&&<img src={data.projeto.cliente_logo} alt="Cliente" className="h-6 object-contain opacity-80"/>}
          </div>
          {currentClima&&(
            <div className="flex items-center gap-3 mt-2 bg-white/10 rounded-lg px-3 py-1.5 text-xs">
              <span className="text-lg">{weatherIcon(currentClima.icon)}</span>
              <span className="font-medium">{currentClima.min}°—{currentClima.max}°</span>
              <span className="text-white/60">{currentClima.chuva}mm</span>
              <span className="text-white/50 truncate flex-1">{currentClima.desc}</span>
            </div>
          )}
        </div>
        <div className="h-1 bg-white/10"><div className="h-full bg-accent transition-all duration-1000" style={{width:`${dayProgress}%`}}/></div>
      </header>

      <div className="sticky top-[140px] z-30 bg-gray-50 pt-3 pb-2 px-4 no-print">
        <div className="max-w-lg mx-auto flex gap-2 overflow-x-auto hide-scroll">
          {data.dias.map(dia=><DayTab key={dia.data} dia={dia} active={selectedDay===dia.data} onClick={()=>setSelectedDay(dia.data)}/>)}
        </div>
      </div>

      <div className="max-w-lg mx-auto px-4 mt-2 mb-3 no-print">
        <div className="flex items-center justify-between">
          <div><h2 className="text-lg font-bold text-dark">{currentDia?.semana}, {currentDia?.label}</h2>
            <div className="flex items-center gap-2 mt-1">
              <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${tipoColor(currentDia?.tipo||'')}`}>{currentDia?.tipo}</span>
              {currentDia?.locacao&&<span className="text-xs text-gray-500">{currentDia.locacao}</span>}</div></div>
          <div className="text-right">
            <div className="text-2xl font-bold text-dark tabular-nums">{String(time.getHours()).padStart(2,'0')}:{String(time.getMinutes()).padStart(2,'0')}</div>
            <div className="text-xs text-gray-400">{doneBlocks}/{totalBlocks} concluídos</div></div>
        </div>
      </div>

      <div className="max-w-lg mx-auto px-4 relative" id="timeline-area">
        <div className="timeline-line"/>
        {todayCrono.map(item=><TimelineBlock key={item.id} item={item} isLive={item.status==='em_andamento'} isAdmin={isAdmin} onEdit={setShowEdit}/>)}
        {todayCrono.length===0&&(<div className="text-center py-12 text-gray-400"><span className="text-4xl block mb-3">📋</span>Nenhum quadro para este dia.</div>)}
      </div>

      {isAdmin&&(
        <div className="max-w-lg mx-auto px-4 mt-4 no-print">
          <div className="flex gap-2 flex-wrap">
            <button onClick={handleAddBlock} className="flex-1 bg-accent/10 hover:bg-accent/20 text-accent font-medium py-2.5 rounded-xl tap-scale transition-all text-sm">➕ Adicionar Quadro</button>
            <button onClick={handleExportPDF} className="flex-1 bg-gray-100 hover:bg-gray-200 text-dark font-medium py-2.5 rounded-xl tap-scale transition-all text-sm">📄 Exportar PDF</button>
          </div>
          <div className="flex gap-2 mt-2">
            <button onClick={()=>setShowReport(true)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-dark font-medium py-2.5 rounded-xl tap-scale transition-all text-sm">📊 Relatório</button>
            <button onClick={()=>setShowHistory(true)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-dark font-medium py-2.5 rounded-xl tap-scale transition-all text-sm">📋 Histórico</button>
            <button onClick={()=>setShowNewOD(true)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-dark font-medium py-2.5 rounded-xl tap-scale transition-all text-sm">➕ Nova OD</button>
          </div>
        </div>
      )}

      {liveItem&&<LiveTimer item={liveItem}/>}
      {saved&&(<div className="fixed top-20 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-4 py-2 rounded-full text-sm font-medium shadow-lg animate-fade z-50 no-print">✓ Salvo com sucesso</div>)}
      {showEdit&&<EditModal item={showEdit} onSave={handleSave} onDelete={handleDelete} onClose={()=>setShowEdit(null)} isAdmin={isAdmin}/>}
      {showCheckin&&<CheckInPanel checkins={checkins} equipe={data.equipe} onCheckIn={handleCheckIn} onClose={()=>setShowCheckin(false)} isAdmin={isAdmin}/>}
      {showNotif&&<NotifPanel cronograma={todayCrono} checkins={checkins} isAdmin={isAdmin} onClose={()=>setShowNotif(false)}/>}
      {showTeam&&<TeamPanel equipe={data.equipe} locacoes={data.locacoes} onClose={()=>setShowTeam(false)}/>}
      {showReport&&<ReportModal cronograma={cronograma} checkins={checkins} onClose={()=>setShowReport(false)}/>}
      {showHistory&&<HistoryModal historico={MOCK.historico} onClose={()=>setShowHistory(false)} onSelect={(h)=>{setShowHistory(false);}}/>}
      {showNewOD&&<NewODModal onClose={()=>setShowNewOD(false)} onCreate={(p)=>{setShowNewOD(false);setSaved(true);setTimeout(()=>setSaved(false),2000);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
